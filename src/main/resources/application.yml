server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: order-management-system-hexagonal
  
  # ==============================================================
  # PERSISTENCE: PostgreSQL
  # ==============================================================
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:oms_db}
    username: ${POSTGRES_USER:oms_user}
    password: ${POSTGRES_PASSWORD:oms_password}
    driver-class-name: org.postgresql.Driver
    # HikariCP is the default connection pool, optimized for high throughput.
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  
  jpa:
    # Display SQL queries during development for debugging purposes.
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # 'update' allows automatic table creation (ideal for MVP/Development only).
        # In production environments, use 'validate' in conjunction with Flyway/Liquibase.
        hbm2ddl.auto: validate
  
  # ==============================================================
  # CACHE: Redis
  # ==============================================================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:oms_redis_pass}
      timeout: 2000 # Connection timeout in milliseconds.
  
  # ==============================================================
  # ASYNCHRONOUS MESSAGING: Kafka
  # ==============================================================
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}
    producer:
      # Serialization strategy: Key is a String (Order ID), 
      # Value is JSON (the OrderCreated event payload).
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true # Includes type headers to help consumers identify the class to parse.
    consumer:
      # Consumer Group: Multiple instances sharing a group enable load balancing.
      group-id: oms-consumer-group
      auto-offset-reset: earliest # If no previous offset exists, start from the beginning of the topic.
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.oms.domain.event" # Security: only permit deserialization for this package.
 
# ==============================================================
# OBSERVABILITY: Actuator Endpoints
# ==============================================================
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always # Exposes health status for DB, Redis, and Kafka connections.
  
  # ==============================================================
  # TRACING: Micrometer + Zipkin
  # ==============================================================
  tracing:
    sampling:
      probability: 1.0 # Captures 100% of traces for development and analysis.
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans

# ==============================================================
# SECURITY: Basic Authentication Credentials
# ==============================================================
oms:
  security:
    username: ${OMS_SECURITY_USER:admin}
    password: ${OMS_SECURITY_PASS:admin123}

# ==============================================================
# LOGGING: Structured format with Trace/Span IDs
# ==============================================================
logging:
  pattern:
    # Standard Spring logging format: Severity [App, TraceId, SpanId] Logger : Message
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
